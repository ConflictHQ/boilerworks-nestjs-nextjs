services:
  api:
    build:
      context: ../apps/api
      dockerfile: ../../docker/Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://dbadmin:dbadmin@postgres:5432/boilerworks
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: boilerworks
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      CORS_ORIGINS: http://localhost:3000
      NODE_ENV: development
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api/src:/app/src
      - ../apps/api/prisma:/app/prisma

  web:
    build:
      context: ../apps/web
      dockerfile: ../../docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_ROOT: http://localhost:4000
      NODE_ENV: development
    volumes:
      - ../apps/web/app:/app/app
      - ../apps/web/components:/app/components
      - ../apps/web/graphql:/app/graphql
      - ../apps/web/hooks:/app/hooks
      - ../apps/web/lib:/app/lib
      - ../apps/web/i18n:/app/i18n
      - ../apps/web/messages:/app/messages
      - ../apps/web/public:/app/public

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boilerworks
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: dbadmin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin -d boilerworks"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  miniodata:
